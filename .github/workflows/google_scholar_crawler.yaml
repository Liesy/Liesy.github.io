name: Get Citation Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Run crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: |
          cd google_scholar_crawler
          python3 main.py

      - name: Copy results into main branch data directory
        run: |
          mkdir -p _data/google_scholar
          cp -f google_scholar_crawler/results/*.json _data/google_scholar/

      - name: Commit updated citation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/google_scholar/*.json
          git commit -m "Update Google Scholar citation data" || echo "No changes to commit"
          git push origin HEAD:main
